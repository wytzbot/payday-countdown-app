<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payday Countdown - Salary Budget Planner</title>
    <meta name="description" content="Track days until payday. Calculate safe-to-spend daily budget. 100% offline, no login required.">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen" x-data="paydayApp()" x-init="init()" x-cloak>
    <div class="max-w-md mx-auto p-4">
        <!-- Header -->
        <div class="text-center mb-6 pt-4">
            <h1 class="text-2xl font-bold text-blue-400">Payday Countdown</h1>
            <p class="text-slate-400 text-sm mt-1">Your daily safe-to-spend budget</p>
        </div>

        <!-- Setup Screen -->
        <div x-show="!hasData" class="space-y-4">
            <div class="bg-slate-800 rounded-xl p-5">
                <h2 class="text-lg font-semibold mb-4">Quick Setup</h2>
                
                <label class="block mb-3">
                    <span class="text-sm text-slate-300">Monthly Salary</span>
                    <input type="number" x-model.number="setup.salary" placeholder="50000" 
                           class="w-full mt-1 bg-slate-700 rounded-lg px-3 py-2 text-white">
                </label>

                <label class="block mb-3">
                    <span class="text-sm text-slate-300">Current Balance</span>
                    <input type="number" x-model.number="setup.balance" placeholder="35000" 
                           class="w-full mt-1 bg-slate-700 rounded-lg px-3 py-2 text-white">
                </label>

                <label class="block mb-3">
                    <span class="text-sm text-slate-300">Currency</span>
                    <select x-model="setup.currency" class="w-full mt-1 bg-slate-700 rounded-lg px-3 py-2 text-white">
                        <option value="₦">₦ NGN - Naira</option>
                        <option value="$">$ USD - Dollar</option>
                        <option value="€">€ EUR - Euro</option>
                        <option value="£">£ GBP - Pound</option>
                        <option value="₹">₹ INR - Rupee</option>
                        <option value="GHS">GHS - Cedi</option>
                        <option value="KES">KES - Shilling</option>
                    </select>
                </label>

                <label class="block mb-4">
                    <span class="text-sm text-slate-300">Payday Rule</span>
                    <select x-model="setup.paydayRule" class="w-full mt-1 bg-slate-700 rounded-lg px-3 py-2 text-white">
                        <option value="last">Last day of month</option>
                        <option value="25">25th of month</option>
                        <option value="28">28th of month</option>
                        <option value="friday">Last Friday of month</option>
                    </select>
                </label>

                <button @click="saveSetup()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 rounded-lg py-3 font-semibold transition">
                    Start Tracking
                </button>
            </div>
        </div>

        <!-- Main App -->
        <div x-show="hasData" class="space-y-4">
            <!-- Countdown Card -->
            <div class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl p-6 text-center">
                <div class="text-sm opacity-80 mb-1">Days Until Payday</div>
                <div class="text-6xl font-bold mb-2" x-text="daysLeft"></div>
                <div class="text-sm opacity-80" x-text="paydayDate"></div>
            </div>

            <!-- Safe to Spend Card -->
            <div class="bg-slate-800 rounded-xl p-5">
                <div class="text-sm text-slate-400 mb-1">Safe to Spend Today</div>
                <div class="text-4xl font-bold text-green-400" x-text="formatMoney(safeToSpend)"></div>
                <div class="text-xs text-slate-500 mt-2">
                    Balance: <span x-text="formatMoney(balance)"></span> ÷ <span x-text="daysLeft"></span> days
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="grid grid-cols-2 gap-3">
                <button @click="logExpense()" 
                        class="bg-red-600 hover:bg-red-700 rounded-xl py-4 font-semibold transition">
                    - Log Expense
                </button>
                <button @click="addIncome()" 
                        class="bg-green-600 hover:bg-green-700 rounded-xl py-4 font-semibold transition">
                    + Add Income
                </button>
            </div>

            <!-- Notification Toggle -->
            <button @click="toggleNotifications()" 
                    class="w-full bg-slate-800 hover:bg-slate-700 rounded-xl py-3 text-sm transition">
                <span x-text="notifEnabled ? '🔔 Daily 9AM Reminder ON' : '🔕 Enable Daily Reminder'"></span>
            </button>

            <!-- Reset -->
            <button @click="resetApp()" class="w-full text-slate-500 text-xs mt-6 hover:text-slate-400">
                Reset All Data
            </button>
        </div>

        <!-- Footer -->
        <div class="text-center text-xs text-slate-600 mt-8 pb-4">
            100% Offline • No data leaves your device • <a href="privacy.html" class="underline">Privacy</a>
        </div>
    </div>

    <script>
        function paydayApp() {
            return {
                hasData: false,
                setup: { salary: '', balance: '', currency: '₦', paydayRule: 'last' },
                balance: 0,
                currency: '₦',
                paydayRule: 'last',
                daysLeft: 0,
                paydayDate: '',
                safeToSpend: 0,
                notifEnabled: false,

                init() {
                    this.loadData();
                    this.calcPayday();
                    this.checkNotifications();
                    this.registerSW();
                },

                loadData() {
                    const saved = localStorage.getItem('paydayData');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.balance = data.balance;
                        this.currency = data.currency;
                        this.paydayRule = data.paydayRule;
                        this.hasData = true;
                    }
                },

                saveSetup() {
                    if (!this.setup.salary || !this.setup.balance) {
                        alert('Please fill all fields');
                        return;
                    }
                    this.balance = this.setup.balance;
                    this.currency = this.setup.currency;
                    this.paydayRule = this.setup.paydayRule;
                    localStorage.setItem('paydayData', JSON.stringify({
                        balance: this.balance,
                        currency: this.currency,
                        paydayRule: this.paydayRule
                    }));
                    this.hasData = true;
                    this.calcPayday();
                },

                calcPayday() {
                    const today = new Date();
                    const year = today.getFullYear();
                    const month = today.getMonth();
                    let payday = new Date();

                    if (this.paydayRule === 'last') {
                        payday = new Date(year, month + 1, 0);
                    } else if (this.paydayRule === 'friday') {
                        payday = new Date(year, month + 1, 0);
                        while (payday.getDay() !== 5) payday.setDate(payday.getDate() - 1);
                    } else {
                        payday = new Date(year, month, parseInt(this.paydayRule));
                    }

                    if (payday <= today) {
                        if (this.paydayRule === 'last') {
                            payday = new Date(year, month + 2, 0);
                        } else if (this.paydayRule === 'friday') {
                            payday = new Date(year, month + 2, 0);
                            while (payday.getDay() !== 5) payday.setDate(payday.getDate() - 1);
                        } else {
                            payday = new Date(year, month + 1, parseInt(this.paydayRule));
                        }
                    }

                    const diff = Math.ceil((payday - today) / (1000 * 60 * 60 * 24));
                    this.daysLeft = diff > 0 ? diff : 1;
                    this.paydayDate = payday.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    this.safeToSpend = Math.floor(this.balance / this.daysLeft);
                },

                logExpense() {
                    const amount = prompt('Expense amount:');
                    if (amount && !isNaN(amount) && amount > 0) {
                        this.balance -= parseFloat(amount);
                        this.saveBalance();
                        this.calcPayday();
                    }
                },

                addIncome() {
                    const amount = prompt('Income amount:');
                    if (amount && !isNaN(amount) && amount > 0) {
                        this.balance += parseFloat(amount);
                        this.saveBalance();
                        this.calcPayday();
                    }
                },

                saveBalance() {
                    const data = JSON.parse(localStorage.getItem('paydayData'));
                    data.balance = this.balance;
                    localStorage.setItem('paydayData', JSON.stringify(data));
                },

                formatMoney(amount) {
                    return this.currency + amount.toLocaleString();
                },

                resetApp() {
                    if (confirm('Reset all data? This cannot be undone.')) {
                        localStorage.removeItem('paydayData');
                        location.reload();
                    }
                },

                async toggleNotifications() {
                    if (!('Notification' in window)) {
                        alert('Notifications not supported on this device');
                        return;
                    }
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        this.notifEnabled = !this.notifEnabled;
                        localStorage.setItem('notifEnabled', this.notifEnabled);
                        if (this.notifEnabled) this.scheduleNotification();
                    }
                },

                checkNotifications() {
                    this.notifEnabled = localStorage.getItem('notifEnabled') === 'true';
                },

                scheduleNotification() {
                    // Basic: browser handles this via SW. Full scheduling needs backend.
                    if (this.notifEnabled && 'serviceWorker' in navigator) {
                        navigator.serviceWorker.ready.then(reg => {
                            reg.showNotification('Payday Countdown', {
                                body: `You can spend ${this.formatMoney(this.safeToSpend)} today`,
                                icon: 'icon-192.png'
                            });
                        });
                    }
                },

                registerSW() {
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.register('sw.js');
                    }
                }
            }
        }
    </script>
</body>
</html>
